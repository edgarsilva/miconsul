name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run lint/static checks
        run: go vet ./...

  unit-service-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit and service tests
        run: go test ./internal/... -count=1

  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run integration tests
        run: go test ./tests/... -count=1

  race-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run race detector
        run: go test -race ./... -count=1

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate coverage profile and summary
        run: |
          mkdir -p coverage
          go test ./... -covermode=atomic -coverprofile=coverage/c.out
          go tool cover -func=coverage/c.out > coverage/summary.txt
          total_line=$(tail -n 1 coverage/summary.txt)
          echo "$total_line"
          {
            echo "## Coverage (Phase 1: report-only)"
            echo ""
            echo "\`$total_line\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            coverage/c.out
            coverage/summary.txt

  go-tests:
    runs-on: ubuntu-latest
    needs:
      - lint-static
      - unit-service-tests
      - integration-tests
      - race-tests
      - coverage

    steps:
      - name: Confirm test workflow gates passed
        run: echo "All test workflow stages completed successfully."
