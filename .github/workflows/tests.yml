name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit and integration tests
        run: go test ./...

      - name: Run race detector
        run: go test -race ./...
