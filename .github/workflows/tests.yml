name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  make-help:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity check make targets
        run: make help

  lint-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run lint/static checks
        run: make lint

  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run default test suite (race-enabled)
        run: make test

  race-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run race detector
        run: make test/race

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate coverage profile and summary
        run: |
          make test/coverage
          filtered_total_line=$(tail -n 1 coverage/summary.filtered.txt)
          service_lowest=$(head -n 10 coverage/service_pkg_coverage.txt)

          {
            echo "## Coverage"
            echo ""
            echo "- Unified filtered total (internal + tests, excludes localize + *_templ.go): \`$filtered_total_line\`"
            echo ""
            echo "### Lowest service package coverage (filtered)"
            echo "\`\`\`"
            echo "$service_lowest"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            coverage/all.out
            coverage/all.filtered.out
            coverage/summary.filtered.txt
            coverage/pkg_coverage.txt
            coverage/service_pkg_coverage.txt

  go-tests:
    runs-on: ubuntu-latest
    needs:
      - make-help
      - lint-static
      - tests
      - race-tests
      - coverage

    steps:
      - name: Confirm test workflow gates passed
        run: echo "All test workflow stages completed successfully."
