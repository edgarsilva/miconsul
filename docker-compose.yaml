name: miconsul

services:
  app:
    build: .
    depends_on:
      lgtm:
        condition: service_started
      valkey:
        condition: service_started
    volumes:
      - ./store:/app/store
    ports:
      - 3000:3000
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/readyz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    env_file:
      - ./.env
    environment:
      APP_ENV: ${APP_ENV:-development}
      DB_PATH: /app/store/app.sqlite
      OTEL_EXPORTER_OTLP_ENDPOINT: lgtm:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      JOBS_ENABLED: ${JOBS_ENABLED:-true}
      VALKEY_HOST: ${VALKEY_HOST:-valkey}
      VALKEY_PORT: ${VALKEY_PORT:-6379}
      VALKEY_DB: ${VALKEY_DB:-0}

  lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - 3001:3000
      - 4317:4317
      - 4318:4318
    volumes:
      - lgtm-data:/data

  valkey:
    image: valkey/valkey:8
    ports:
      - 6379:6379
    volumes:
      - valkey-data:/data

volumes:
  lgtm-data:
  valkey-data:
